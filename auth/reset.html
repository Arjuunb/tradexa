<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Tradexa</title>
  <meta name="robots" content="noindex"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0d0f12;font-family:'Inter',sans-serif;color:#F5F5F5;-webkit-font-smoothing:antialiased}
    :root{--g:#FFB732;--border:rgba(255,255,255,.1);--muted:#A1A1AA;--dim:#525252}
    .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
    .page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,rgba(255,183,50,.07),transparent 60%);pointer-events:none}
    .card{width:100%;max-width:400px;position:relative;z-index:1;background:rgba(19,22,27,.85);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 36px;box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
    .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(255,183,50,.2),rgba(94,129,172,.1));border:1px solid rgba(255,183,50,.3);display:flex;align-items:center;justify-content:center;font-size:18px}
    .logo-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.04em}
    .card h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.04em;text-align:center;margin-bottom:6px}
    .card .sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
    .field input{width:100%;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
    .field input:focus{border-color:rgba(255,183,50,.45);background:rgba(255,183,50,.03)}
    .field input::placeholder{color:var(--dim)}
    .submit-btn{width:100%;padding:13px;border-radius:10px;background:#FFB732;color:#0d0f12;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;margin-top:4px}
    .submit-btn:hover{background:#b08c1f}
    .submit-btn:disabled{opacity:.55;cursor:not-allowed}
    .banner{display:none;border-radius:8px;padding:11px 14px;font-size:13px;font-weight:500;margin-bottom:16px;line-height:1.5}
    .banner.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
    .banner.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#86efac}
    .footer-link{text-align:center;font-size:13px;color:var(--muted);margin-top:22px}
    .footer-link a{color:var(--g);text-decoration:none;font-weight:600}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loadingState{text-align:center;padding:20px 0;color:var(--muted);font-size:14px}
    #loadingSpinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(255,183,50,.2);border-top-color:#FFB732;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-mark">📈</div>
      <span class="logo-name">Tradexa</span>
    </div>
    <h1>Set new password</h1>
    <p class="sub">Enter a new password for your account</p>

    <div id="loadingState">
      <div id="loadingSpinner"></div>
      <div>Verifying reset link…</div>
    </div>

    <div id="banner" class="banner" role="alert"></div>

    <form id="resetForm" novalidate style="display:none">
      <div class="field">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required/>
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" required/>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Update Password</button>
    </form>

    <p class="footer-link"><a href="/auth/login.html">Back to login</a></p>
  </div>
</div>
<script src="/assets/supabase-auth.js"></script>
<script>
(function () {
  'use strict';

  function showBanner(msg, type) {
    var el = document.getElementById('banner');
    el.textContent   = msg;
    el.className     = 'banner ' + (type || 'err');
    el.style.display = 'block';
  }
  function setLoading(on) {
    var btn = document.getElementById('submitBtn');
    btn.disabled  = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Updating…' : 'Update Password';
  }

  TxAuth.ready
    .then(function (client) {
      // Check if we have a RECOVERY session from the email link
      client.auth.getSession().then(function (result) {
        var session = result.data && result.data.session;
        document.getElementById('loadingState').style.display = 'none';
        if (session) {
          document.getElementById('resetForm').style.display = 'block';
        } else {
          showBanner('This reset link is invalid or has expired. Please request a new one.');
        }
      });

      // Also listen for PASSWORD_RECOVERY event (hash-based flow)
      client.auth.onAuthStateChange(function (event, session) {
        if (event === 'PASSWORD_RECOVERY') {
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('resetForm').style.display    = 'block';
        }
      });

      document.getElementById('resetForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        var pw  = document.getElementById('password').value;
        var pw2 = document.getElementById('confirm').value;
        if (pw.length < 8)  { showBanner('Password must be at least 8 characters.'); return; }
        if (pw !== pw2)     { showBanner('Passwords do not match.'); return; }
        setLoading(true);
        try {
          var { error } = await client.auth.updateUser({ password: pw });
          if (error) {
            showBanner(error.message || 'Could not update password.');
          } else {
            showBanner('Password updated! Redirecting you to the app…', 'ok');
            setTimeout(function () { location.replace('/app/dashboard.html'); }, 2000);
          }
        } catch (err) {
          showBanner(err.message || 'An unexpected error occurred.');
        } finally {
          setLoading(false);
        }
      });
    })
    .catch(function (err) {
      document.getElementById('loadingState').style.display = 'none';
      showBanner('Authentication service unavailable. ' + (err.message || ''));
    });
})();
</script>
</body>
</html>
